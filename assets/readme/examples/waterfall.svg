<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ARR waterfall example</title>
  <desc id="desc">A consulting-style ARR waterfall example with starting ARR, growth drivers, churn, and ending ARR.</desc>
  <rect width="800" height="450" fill="#FFFFFF"/>
  <rect x="34" y="30" width="732" height="390" rx="12" fill="#F8FAFC" stroke="#D1D5DB"/>
  <text x="64" y="72" fill="#000000" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700">Enterprise expansion drives ARR growth</text>
  <text x="64" y="104" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="15">Waterfall chart spec: Q1 ARR to Q4 ARR</text>
  <line x1="86" y1="335" x2="710" y2="335" stroke="#374151"/>
  <rect x="96" y="230" width="72" height="105" fill="#1E3A8A"/>
  <rect x="202" y="176" width="72" height="159" fill="#2563EB"/>
  <rect x="308" y="132" width="72" height="203" fill="#2563EB"/>
  <rect x="414" y="315" width="72" height="20" fill="#B91C1C"/>
  <rect x="560" y="100" width="72" height="235" fill="#1E3A8A"/>
  <text x="96" y="214" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">$10.0M</text>
  <text x="202" y="160" fill="#1E3A8A" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">+$3.0M</text>
  <text x="308" y="116" fill="#1E3A8A" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">+$2.5M</text>
  <text x="414" y="300" fill="#B91C1C" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">-$0.5M</text>
  <text x="560" y="84" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">$15.0M</text>
  <text x="90" y="365" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="13">Q1 ARR</text>
  <text x="190" y="365" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="13">Enterprise</text>
  <text x="306" y="365" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="13">Expansion</text>
  <text x="424" y="365" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="13">Churn</text>
  <text x="558" y="365" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="13">Q4 ARR</text>
  <rect x="520" y="145" width="178" height="58" rx="8" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="536" y="172" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Insight</text>
  <text x="536" y="193" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="13">Net +$5.0M ARR</text>
</svg>
