<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Market share example</title>
  <desc id="desc">A market share and adoption example with a donut chart and key statistics.</desc>
  <rect width="800" height="450" fill="#FFFFFF"/>
  <rect x="34" y="30" width="732" height="390" rx="12" fill="#F8FAFC" stroke="#D1D5DB"/>
  <text x="64" y="72" fill="#000000" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700">AI workflow adoption reaches majority</text>
  <text x="64" y="104" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="15">Market share / adoption spec: part-to-whole story</text>
  <circle cx="250" cy="255" r="104" fill="none" stroke="#D1D5DB" stroke-width="34"/>
  <path d="M250 151a104 104 0 1 1 -97 141" fill="none" stroke="#1E3A8A" stroke-width="34" stroke-linecap="round"/>
  <text x="214" y="265" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">64%</text>
  <g transform="translate(430 178)">
    <text x="0" y="0" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Key statistics</text>
    <rect x="0" y="34" width="16" height="16" fill="#1E3A8A"/>
    <text x="28" y="48" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="15">64% adopted AI workflow</text>
    <rect x="0" y="72" width="16" height="16" fill="#D1D5DB"/>
    <text x="28" y="86" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="15">36% remaining manual workflow</text>
    <text x="0" y="132" fill="#1E3A8A" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Implication</text>
    <text x="0" y="158" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="14">Operational model is ready to scale.</text>
  </g>
</svg>
