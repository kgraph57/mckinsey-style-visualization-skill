<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Board update slide spec preview</title>
  <desc id="desc">Preview of five board update slide specs produced by the skill.</desc>
  <rect width="800" height="450" fill="#FFFFFF"/>
  <rect x="30" y="26" width="740" height="398" rx="14" fill="#F8FAFC" stroke="#D1D5DB"/>
  <text x="60" y="72" fill="#000000" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">Board update story from raw metrics</text>
  <text x="60" y="104" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="16">Input: ARR, churn, AI adoption, capacity risk</text>

  <g transform="translate(60 145)">
    <rect width="132" height="190" rx="8" fill="#1E3A5F"/>
    <text x="18" y="42" fill="#FFFFFF" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700">Cover</text>
    <text x="18" y="78" fill="#E5E7EB" font-family="Arial, Helvetica, sans-serif" font-size="12">Growth is strong</text>
    <text x="18" y="98" fill="#E5E7EB" font-family="Arial, Helvetica, sans-serif" font-size="12">capacity is tight</text>
  </g>
  <g transform="translate(210 145)">
    <rect width="132" height="190" rx="8" fill="#FFFFFF" stroke="#D1D5DB"/>
    <text x="16" y="36" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">ARR bridge</text>
    <rect x="18" y="132" width="18" height="28" fill="#1E3A8A"/>
    <rect x="45" y="100" width="18" height="60" fill="#2563EB"/>
    <rect x="72" y="82" width="18" height="78" fill="#2563EB"/>
    <rect x="99" y="145" width="18" height="15" fill="#B91C1C"/>
    <line x1="16" y1="160" x2="118" y2="160" stroke="#374151"/>
  </g>
  <g transform="translate(360 145)">
    <rect width="132" height="190" rx="8" fill="#FFFFFF" stroke="#D1D5DB"/>
    <text x="16" y="36" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">AI adoption</text>
    <polyline points="18,142 58,118 98,74" fill="none" stroke="#1E3A8A" stroke-width="5"/>
    <circle cx="18" cy="142" r="5" fill="#1E3A8A"/>
    <circle cx="98" cy="74" r="5" fill="#1E3A8A"/>
    <text x="16" y="168" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="12">18% to 64%</text>
  </g>
  <g transform="translate(510 145)">
    <rect width="132" height="190" rx="8" fill="#FFFFFF" stroke="#D1D5DB"/>
    <text x="16" y="36" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Capacity gap</text>
    <rect x="18" y="82" width="96" height="18" rx="9" fill="#1E3A8A"/>
    <rect x="18" y="124" width="64" height="18" rx="9" fill="#D1D5DB"/>
    <text x="18" y="168" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="12">12 / 18 coverage</text>
  </g>
  <g transform="translate(660 145)">
    <rect width="80" height="190" rx="8" fill="#FFFFFF" stroke="#D1D5DB"/>
    <text x="14" y="36" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Decision</text>
    <circle cx="40" cy="82" r="22" fill="#1E3A8A"/>
    <path d="M30 82L38 90L52 72" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="14" y="130" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="11">Invest before</text>
    <text x="14" y="148" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="11">raising targets</text>
  </g>
  <text x="60" y="382" fill="#1E3A8A" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Output: five slide specs with headlines, layouts, assumptions, and quality checks.</text>
</svg>
