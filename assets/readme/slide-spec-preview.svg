    <text x="22" y="38" fill="#1E3A8A" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">RENDERABLE PLAN</text>
    <rect x="24" y="70" width="42" height="82" fill="#1E3A8A"/>
    <rect x="78" y="42" width="42" height="110" fill="#2563EB"/>
    <rect x="132" y="95" width="42" height="57" fill="#B91C1C"/>
    <rect x="186" y="56" width="42" height="96" fill="#1E3A8A"/>
    <line x1="22" y1="152" x2="236" y2="152" stroke="#374151"/>
    <rect x="24" y="178" width="190" height="10" rx="5" fill="#D1D5DB"/>
    <rect x="24" y="200" width="145" height="10" rx="5" fill="#D1D5DB"/>
  </g>
  <text x="60" y="400" fill="#1E3A8A" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">The skill explains what to build, why it matters, and how to check it.</text>
