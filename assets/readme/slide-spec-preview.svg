<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Slide specification preview</title>
  <desc id="desc">Preview of the structured slide specification produced by the skill.</desc>
  <rect width="800" height="450" fill="#FFFFFF"/>
  <rect x="30" y="26" width="740" height="398" rx="14" fill="#F8FAFC" stroke="#D1D5DB"/>
  <text x="60" y="72" fill="#000000" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">Output is a reproducible slide spec</text>
  <text x="60" y="104" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="16">Agents, designers, and renderers can execute the same visual plan.</text>

  <g transform="translate(60 140)">
    <rect width="310" height="226" rx="10" fill="#FFFFFF" stroke="#D1D5DB"/>
    <text x="22" y="38" fill="#1E3A8A" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">STRUCTURED SPEC</text>
    <text x="22" y="70" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Insight headline</text>
    <text x="22" y="96" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="14">Growth momentum is strong,</text>
    <text x="22" y="116" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="14">but capacity is the constraint.</text>
    <line x1="22" y1="138" x2="288" y2="138" stroke="#D1D5DB"/>
    <text x="22" y="166" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Slide spec</text>
    <text x="22" y="192" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="13">Pattern: waterfall + gap visual</text>
    <text x="22" y="212" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="13">Data: explicit values and assumptions</text>
  </g>

  <path d="M392 254H444" stroke="#1E3A8A" stroke-width="4" stroke-linecap="round"/>
  <path d="M444 254L432 242M444 254L432 266" stroke="#1E3A8A" stroke-width="4" stroke-linecap="round"/>

  <g transform="translate(470 140)">
