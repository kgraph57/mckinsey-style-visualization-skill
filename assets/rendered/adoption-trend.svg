<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="AI workflow adoption rose 46 points in four quarters, creating a scalable operating base">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="80.0" y="52.0" width="56.0" height="5.0" fill="#1E3A8A" stroke="none"/>
  <text x="80.0" y="96.0" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#000000" font-weight="bold" text-anchor="start">AI workflow adoption rose 46 points in four quarters, creating a</text>
  <text x="80.0" y="136.0" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#000000" font-weight="bold" text-anchor="start">scalable operating base</text>
  <text x="80.0" y="178.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="17" fill="#6B7280" font-weight="normal" text-anchor="start">Share of accounts on AI workflows</text>
  <line x1="80.0" y1="560.0" x2="1200.0" y2="560.0" stroke="#374151"/>
  <polyline points="80.0,478.0 453.3,418.7 826.7,336.7 1200.0,268.3" fill="none" stroke="#1E3A8A" stroke-width="3"/>
  <circle cx="80.0" cy="478.0" r="5" fill="#1E3A8A"/>
  <text x="80.0" y="464.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" fill="#000000" font-weight="bold" text-anchor="middle">18%</text>
  <text x="80.0" y="584.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#374151" font-weight="normal" text-anchor="middle">Q1</text>
  <circle cx="453.3" cy="418.7" r="5" fill="#1E3A8A"/>
  <text x="453.3" y="404.7" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" fill="#000000" font-weight="bold" text-anchor="middle">31%</text>
  <text x="453.3" y="584.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#374151" font-weight="normal" text-anchor="middle">Q2</text>
  <circle cx="826.7" cy="336.7" r="5" fill="#1E3A8A"/>
  <text x="826.7" y="322.7" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" fill="#000000" font-weight="bold" text-anchor="middle">49%</text>
  <text x="826.7" y="584.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#374151" font-weight="normal" text-anchor="middle">Q3</text>
  <circle cx="1200.0" cy="268.3" r="5" fill="#1E3A8A"/>
  <text x="1200.0" y="254.3" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" fill="#000000" font-weight="bold" text-anchor="middle">64%</text>
  <text x="1200.0" y="584.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#374151" font-weight="normal" text-anchor="middle">Q4</text>
  <text x="80.0" y="194.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280" font-weight="normal" text-anchor="start">Adoption rate</text>
  <rect x="80.0" y="612.0" width="4.0" height="40.0" fill="#1E3A8A" stroke="none"/>
  <text x="96.0" y="630.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" fill="#1E3A8A" font-weight="600" text-anchor="start">Adoption has crossed the majority threshold; delivery capacity is now the constraint.</text>
  <text x="80.0" y="692.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" fill="#6B7280" font-weight="normal" text-anchor="start">Source: user-provided product telemetry.</text>
</svg>
